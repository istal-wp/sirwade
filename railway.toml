[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/docker-entrypoint.sh apache2-foreground"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "web"

[services.healthcheck]
path = "/login.php"
initialDelaySeconds = 10
periodSeconds = 30
timeoutSeconds = 10
failureThreshold = 3
